# GitHub Actions Workflow for Building Windows Executable
# 自動化生成 AI File Repair Windows .exe

name: Build Windows Executable

# 觸發條件
on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PYTHON_VERSION: '3.11'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pyinstaller requests requests-oauthlib
        shell: pwsh
      
      - name: Build executable
        run: |
          cd scripts
          python -m PyInstaller --onefile --windowed --name "AI File Repair" gui_main.py
        shell: pwsh
      
      - name: Verify build
        run: |
          if (Test-Path "scripts/dist/AI File Repair.exe") {
            Write-Host "Build successful!"
            Get-Item "scripts/dist/AI File Repair.exe" | Select-Object Name, Length, LastWriteTime
          } else {
            Write-Host "Build failed! File not found."
            exit 1
          }
        shell: pwsh
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-File-Repair-Windows
          path: scripts/dist/AI File Repair.exe
          retention-days: 7
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: scripts/dist/AI File Repair.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}