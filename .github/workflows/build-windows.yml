# GitHub Actions Workflow for Building Windows Executable
# 自動化生成 AI File Repair Windows .exe

name: Build Windows Executable

# 觸發條件
on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  release:
    types: [created, edited]

# 環境變量
env:
  PYTHON_VERSION: '3.11'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: x64

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pyinstaller
        shell: pwsh

      - name: Build executable
        run: |
          cd scripts
          pyinstaller --onefile --windowed --name "AI File Repair" ^
            --icon=../windows/icon.ico ^
            --add-data "assets;assets" ^
            gui_main.py
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-File-Repair-Windows
          path: scripts/dist/AI File Repair.exe
          retention-days: 7

      - name: Upload to Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v1
        with:
          files: scripts/dist/AI File Repair.exe
          generate_release_notes: true

  build-linux:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: x64

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pyinstaller
          sudo apt-get update && sudo apt-get install -y libtcl8.6 libtk8.6

      - name: Build executable
        run: |
          cd scripts
          pyinstaller --onefile --windowed --name "AI File Repair" ^
            gui_main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-File-Repair-Linux
          path: scripts/dist/AI File Repair
          retention-days: 7